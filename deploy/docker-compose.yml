# eden — production compose (single host). Runbook: deploy/README.md.
# Media is stored on the local `uploads` volume; switch to S3/R2 later via env
# (set EDEN_S3_* in .env) with no code change.
name: eden

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes compose interpolation → the db container's shell expands it.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Fail loudly if unset rather than expanding to an empty image reference.
    image: ${APP_IMAGE:?APP_IMAGE is required (set it in .env / the deploy workflow)}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # Public address — drives URL generation + the LiveView socket check_origin.
      # IP phase:     PHX_HOST=<ip>  PHX_SCHEME=http   PHX_PORT=80
      # Domain phase: PHX_HOST=host  PHX_SCHEME=https  PHX_PORT=443
      PHX_HOST: ${PHX_HOST}
      PHX_SCHEME: ${PHX_SCHEME}
      PHX_PORT: ${PHX_PORT}
      # Internal listen port (Caddy proxies to it); not exposed to the host.
      PORT: "4000"
      PHX_SERVER: "true"
      EDEN_UPLOADS_ROOT: /var/lib/eden/uploads
      # Object storage (optional): set these to move media off the local volume.
      EDEN_S3_BUCKET: ${EDEN_S3_BUCKET:-}
      EDEN_S3_REGION: ${EDEN_S3_REGION:-}
      EDEN_S3_ENDPOINT: ${EDEN_S3_ENDPOINT:-}
      EDEN_S3_ACCESS_KEY_ID: ${EDEN_S3_ACCESS_KEY_ID:-}
      EDEN_S3_SECRET_ACCESS_KEY: ${EDEN_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/var/lib/eden/uploads
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      # Don't proxy until the app passes its healthcheck (avoids a 502 window).
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # IP phase: ":80" (plain HTTP). Domain phase: "chat.ihi.ru" (auto-TLS).
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
