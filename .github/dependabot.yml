version: 2
updates:
  # Elixir/Hex dependencies.
  - package-ecosystem: hex
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
