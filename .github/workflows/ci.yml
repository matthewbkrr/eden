name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; individual jobs widen as needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the toolchain. Local dev runs OTP 29, but CI
  # pins OTP 28 — the line officially supported by Elixir 1.19. Bump together.
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "28"
  # The `mix check` pipeline runs in :test locally; mirror that here so compile
  # warnings cover test/support too and the build cache stays coherent.
  MIX_ENV: test

jobs:
  # Static analysis + compile gate. One matrix leg per check = parallel,
  # individually-required status checks that share identical setup.
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { task: format-check, cmd: mix format --check-formatted }
          - { task: compile-warnings-as-errors, cmd: mix compile --warnings-as-errors }
          - { task: credo, cmd: mix credo --strict }
          - { task: sobelow, cmd: mix sobelow --config }
          - { task: deps-audit, cmd: mix deps.audit }
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - run: mix deps.get
      - run: ${{ matrix.cmd }}

  # Type checking with a cached PLT (the slow part to build).
  dialyzer:
    name: dialyzer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - run: mix deps.get

      # PLT lives under priv/plts (see dialyzer/0 in mix.exs); cache it separately
      # so it survives across runs as long as the toolchain + deps are unchanged.
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - run: mix dialyzer --format github

  # Test suite against a real Postgres, matching local/prod (Postgres 16).
  test:
    name: test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      # ffmpeg/ffprobe back the video poster + duration tests (tagged :ffmpeg).
      # heif-convert (libheif-examples) backs the HEIC→JPEG transcode test (tagged
      # :heif, #123). Ubuntu 24.04's libheif (1.17+) uses the plugin model, so the
      # libde265 HEVC *decoder* is a separate package — without it heif-convert
      # exists but can't decode HEIC. (Prod is Debian bookworm, libheif 1.15 with
      # the decoder compiled in — verified in the docker job.) Tests are skipped
      # where the binary is absent (e.g. a bare dev box).
      - name: Install media tools (ffmpeg, libheif)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libheif-examples libheif-plugin-libde265

      - run: mix deps.get
      # The `test` alias creates and migrates the test DB before running.
      - run: mix test

  # Build the actual production Docker image and run it: this is the only job
  # exercising prod compile-time config + runtime.exs + the slim runtime image,
  # so it catches prod-only boot/config regressions and missing runtime libs
  # (e.g. libvips) that the test-env suite can't see.
  docker:
    name: docker-build
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build the production image
        run: docker build -t eden:ci .

      - name: Migrate, boot, and smoke-test the image
        run: |
          set -euo pipefail
          PGPASSWORD=postgres createdb -h localhost -U postgres eden_prod
          SECRET="$(openssl rand -base64 48)"
          ENVS="--network host \
            -e SECRET_KEY_BASE=$SECRET \
            -e DATABASE_URL=ecto://postgres:postgres@localhost:5432/eden_prod \
            -e PHX_HOST=localhost -e PORT=4000"

          # Migrate first (real deploy order: schema before the server + Oban start).
          docker run --rm $ENVS eden:ci /app/bin/migrate

          docker run -d --name eden $ENVS eden:ci

          code=000
          for _ in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/healthz || true)
            [ "$code" = "200" ] && break
            sleep 2
          done
          [ "$code" = "200" ] || { docker logs eden; echo "healthz never returned 200"; exit 1; }

          # libvips (photo thumbnails) must work on the slim runtime image.
          docker exec eden /app/bin/eden eval \
            '{:ok, i} = Image.new(32, 32, color: [1, 2, 3]); {:ok, _} = Image.write(i, :memory, suffix: ".jpg"); IO.puts("vips ok")'

          # heif-convert (libheif) must DECODE HEIC on the slim runtime image: the
          # bundled libvips has no HEVC decoder and the distro ffmpeg can't either,
          # so this is the only HEIC→JPEG path in prod (#123). The Ubuntu test job
          # can't prove this (different libheif packaging), so verify it here on the
          # actual Debian bookworm image with the committed fixture.
          docker cp test/support/fixtures/sample.heic eden:/tmp/sample.heic
          docker exec eden sh -c 'heif-convert /tmp/sample.heic /tmp/heic-out.png && test -s /tmp/heic-out.png'
          echo "heif-convert ok"

      - name: Container logs
        if: always()
        run: docker logs eden || true

  # Secret scanning over the full history.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    # On pull_request the action lists PR commits via the API, which needs
    # pull-requests:read (the workflow defaults to contents:read only).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only required for GitHub *organizations* (free for personal repos):
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # NOTE: dependency-review-action was removed — it needs the Dependency Graph
  # (GitHub Advanced Security), unavailable on this private free repo. Dependency
  # vulnerabilities are covered by `mix deps.audit` (the deps-audit job above)
  # and by Dependabot alerts/security PRs enabled in repo settings.
